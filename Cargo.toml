[workspace]
resolver = "2"
members = [
    "crates/isometry-core",
]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Mark <sgt.mark3@gmail.com>"]
repository = "https://github.com/mark-ik/isometry"
rust-version = "1.80"

[workspace.dependencies]
# Internal crates
isometry-core = { path = "crates/isometry-core", version = "0.1.0" }

# Persistence
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# The serval host stack (xilem-serval, serval-layout, netrender, ...) lands
# in phase I1 as git deps on the mark-ik remotes, with the [patch.crates-io]
# mirror the woodshed root models (stylo, taffy, ipc-channel). See
# design_docs/2026-07-05_isometry_bootstrap_plan.md.
